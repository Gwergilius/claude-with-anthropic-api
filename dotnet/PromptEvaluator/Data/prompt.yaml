taskDescription: Recommend foods and a diet plan tailored to a person's height, weight, goal, and dietary restrictions

prompt: |
  Generate a one-day meal plan for a person that meets their dietary restrictions.  

  <person-info>
  * Height: {height}
  * Weight: {weight}
  * Goal: {goal}
  * Dietary restrictions: {restrictions}
  </person-info>

  Guidelines:
  1. Include accurate daily calorie amount.
  2. Show protein, fat, and carb amounts.
  3. Specify when to eat each meal.
  4. Use only foods that fit dietary restrictions.
  5. List all portion sizes in grams.
  6. Keep budget-friendly if mentioned.

extraCriteria: |
  The output should include:
  - Daily calorie total
  - Macronutrient breakdown (carbohydrates, proteins, fats)
  - Meals with exact foods, portions, and timing
