taskDescription: Recommend foods and a diet plan tailored to a person's height, weight, goal, and dietary restrictions

prompt: |
  What should this person eat?  

  * Height: {height}
  * Weight: {weight}
  * Goal: {goal}
  * Dietary restrictions: {restrictions}

extraCriteria: |
  The output should include:
  * Daily caloric total
  * Macronutrient breakdown  
  * Meals with exact foods, portions, and timing  
