taskDescription: Recommend foods and a diet plan tailored to a person's height, weight, goal, and dietary restrictions

prompt: |
  Generate a one-day meal plan for an athlete that meets their dietary restrictions.  

  * Height: {height}
  * Weight: {weight}
  * Goal: {goal}
  * Dietary restrictions: {restrictions}

  Follow these steps:
  1. Calculate daily calorie needs based on the athlete's height, weight, and goal.
  2. Figure  out protein, fat, and carbohydrate needs based on the calorie needs and dietary restrictions.
  3. Plan meal timing around workouts.
  4. Choose foods that fit the restrictions.
  5. Set portion sizes in grams.
  6. Adjust for budget if needed.

  Respond only with the final meal plan, no reasoning or intermediate steps.

extraCriteria: |
  The output should include:
  - Daily calorie total
  - Macronutrient breakdown (carbohydrates, proteins, fats)
  - Meals with exact foods, portions, and timing
