<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Claude Chat</title>
    <base href="/" />
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#5436da" />
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        html, body, #app {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: system-ui, -apple-system, sans-serif;
        }
        /* Blazor loading / error UI */
        #blazor-error-ui {
            background: #fee;
            bottom: 0;
            box-shadow: 0 -1px 2px rgba(0,0,0,.2);
            display: none;
            left: 0;
            padding: 0.6rem 1.25rem 0.7rem;
            position: fixed;
            width: 100%;
            z-index: 1000;
        }
        #blazor-error-ui .dismiss { cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">Loading…</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">✕</span>
    </div>

    <script>
        /** Scrolls an element to its bottom — called from Blazor via JS interop */
        function scrollToBottom(element) {
            if (element) {
                element.scrollTop = element.scrollHeight;
            }
        }

        /** Sets focus on an element — called from Blazor via JS interop */
        function focusElement(element) {
            if (element) {
                element.focus();
            }
        }
    </script>

    <script src="_framework/blazor.webassembly.js"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js');
        }
    </script>
</body>
</html>
